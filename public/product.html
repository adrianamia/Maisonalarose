<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison à la Rose</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#F6F0E7; --paper:#FBF7F1; --wine:#7C2F3B; --wine-deep:#5C2029;
    --dust:#C99AA0; --sage:#707A5E; --ink:#2A2320; --brass:#AD8A54; --line:rgba(42,35,32,0.14);
    --max:1180px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--ivory);color:var(--ink);font-family:'Jost',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;}
  h1,h2,.serif{font-family:'Fraunces',serif;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 40px;}

  header{position:sticky;top:0;z-index:50;background:rgba(246,240,231,0.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  nav{max-width:var(--max);margin:0 auto;padding:20px 40px;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:22px;color:var(--wine-deep);}
  .back{font-size:13px;letter-spacing:0.06em;opacity:0.75;}
  .back:hover{opacity:1;}

  main{padding:60px 0 100px;}
  .product{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;}
  @media(max-width:800px){.product{grid-template-columns:1fr;gap:36px;}}

  .imgwrap{border:1px solid var(--line);background:var(--paper);overflow:hidden;}
  .imgwrap img{width:100%;display:block;}

  .cat{font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--wine);font-weight:500;}
  h1.title{font-size:clamp(30px,4vw,44px);font-weight:400;color:var(--wine-deep);margin-top:14px;font-style:italic;}
  .tagline{margin-top:16px;font-family:'Fraunces',serif;font-style:italic;font-size:19px;color:var(--wine-deep);line-height:1.5;}
  .price{margin-top:26px;font-size:26px;color:var(--ink);}

  .btn{display:inline-block;padding:16px 34px;border:1px solid var(--wine);background:var(--wine);color:var(--paper);
    font-size:13px;letter-spacing:0.12em;text-transform:uppercase;margin-top:28px;cursor:pointer;transition:background .25s;}
  .btn:hover{background:var(--wine-deep);}
  .btn:disabled{opacity:0.6;cursor:default;}

  .howto{margin-top:44px;padding-top:28px;border-top:1px solid var(--line);}
  .howto p.eyebrow{font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--brass);margin-bottom:12px;}
  .howto p.text{font-size:14.5px;line-height:1.85;color:#4a3f3a;}

  .lang-row{margin-top:36px;font-size:12px;letter-spacing:0.08em;opacity:0.6;}
  .lang-row a{margin-right:4px;}
  .lang-row a.active{opacity:1;font-weight:600;}

  footer{background:var(--wine-deep);color:rgba(251,247,241,0.6);padding:30px 0;text-align:center;font-size:12px;}
</style>
</head>
<body>

<header>
  <nav>
    <a href="index.html" class="logo">Maison à la Rose</a>
    <a href="#" id="backlink" class="back">← Back to shop</a>
  </nav>
</header>

<main>
  <div class="wrap">
    <div class="product">
      <div class="imgwrap">
        <img id="prodImg" src="" alt="">
      </div>
      <div>
        <p class="cat" id="prodCat"></p>
        <h1 class="title" id="prodName"></h1>
        <p class="tagline" id="prodTagline"></p>
        <p class="price" id="prodPrice"></p>
        <button class="btn" id="buyBtn">Buy</button>

        <div class="howto">
          <p class="eyebrow" id="howtoLabel">How it works</p>
          <p class="text" id="prodDesc"></p>
        </div>

        <div class="lang-row" id="langRow"></div>
      </div>
    </div>
  </div>
</main>

<footer>© 2026 Maison à la Rose</footer>

<script src="js/products-data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const lang = ["en","fr","es","it"].includes(params.get('lang')) ? params.get('lang') : 'en';
  const product = PRODUCTS[id];

  const UI = {
    en: { back: "← Back to shop", buy: "Buy now", loading: "Loading…", howto: "How it works", error: "Something went wrong. Please try again.", page: "index.html",
      cat: { cards: "Birthday Cards", invitations: "Invitations", ebooks: "eBooks", planners: "Planners" } },
    fr: { back: "← Retour à la boutique", buy: "Acheter", loading: "Chargement…", howto: "Comment ça marche", error: "Une erreur est survenue. Merci de réessayer.", page: "index-fr.html",
      cat: { cards: "Cartes d'anniversaire", invitations: "Invitations", ebooks: "Ebooks", planners: "Planificateurs" } },
    es: { back: "← Volver a la tienda", buy: "Comprar", loading: "Cargando…", howto: "Cómo funciona", error: "Ha ocurrido un error. Inténtalo de nuevo.", page: "index-es.html",
      cat: { cards: "Tarjetas de Cumpleaños", invitations: "Invitaciones", ebooks: "Ebooks", planners: "Planificadores" } },
    it: { back: "← Torna al negozio", buy: "Acquista", loading: "Caricamento…", howto: "Come funziona", error: "Si è verificato un errore. Riprova.", page: "index-it.html",
      cat: { cards: "Biglietti di Compleanno", invitations: "Inviti", ebooks: "Ebook", planners: "Planner" } },
  };
  const t = UI[lang];

  if (product) {
    document.title = `${product['name' + cap(lang)]} — Maison à la Rose`;
    document.getElementById('prodImg').src = product.image;
    document.getElementById('prodImg').alt = product['name' + cap(lang)];
    document.getElementById('prodCat').textContent = t.cat[product.category];
    document.getElementById('prodName').textContent = product['name' + cap(lang)];
    document.getElementById('prodTagline').textContent = product['tagline' + cap(lang)];
    document.getElementById('prodDesc').textContent = product['description' + cap(lang)];
    document.getElementById('howtoLabel').textContent = t.howto;
    document.getElementById('prodPrice').textContent = formatPrice(product.priceCents, lang);
    document.getElementById('buyBtn').textContent = t.buy;
    document.getElementById('backlink').textContent = t.back;
    document.getElementById('backlink').href = t.page + '#featured';

    document.getElementById('buyBtn').addEventListener('click', () => buy(product.id, lang));
  } else {
    document.querySelector('.product').innerHTML = '<p>Product not found.</p>';
  }

  // language switch row, preserving current product
  const langRow = document.getElementById('langRow');
  langRow.innerHTML = ['en','fr','es','it'].map(l =>
    `<a href="product.html?id=${id}&lang=${l}" class="${l===lang?'active':''}">${l.toUpperCase()}</a>`
  ).join(' · ');

  function cap(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

  function formatPrice(cents, lang){
    const val = (cents/100).toFixed(2).replace('.00','').replace('.', ',');
    return lang === 'en' ? `€${(cents/100).toFixed(2).replace('.00','')}` : `${val} €`;
  }

  async function buy(productId, lang){
    const btn = document.getElementById('buyBtn');
    const original = btn.textContent;
    btn.textContent = t.loading;
    btn.disabled = true;
    try{
      const res = await fetch('/api/create-checkout-session', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ productId, lang })
      });
      const data = await res.json();
      if(data.url){ window.location.href = data.url; }
      else { throw new Error(data.error || 'unknown'); }
    } catch(err){
      alert(t.error);
      btn.textContent = original;
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
